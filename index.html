<style>
:root{
  --bg:#F3F4F8; --surface:#FFFFFF; --ink:#1E2230; --ink-soft:#666B7A; --border:#E4E6EE;
  --primary:#4F46E5; --primary-dark:#4338CA; --primary-soft:#EEF0FF;
  --green:#1F9D6F; --green-soft:#E6F6EF; --red:#E0483E; --red-soft:#FDECEA;
  --amber:#C9810A; --amber-soft:#FBF1DE;
  --radius:16px; --radius-sm:11px;
  --shadow:0 1px 2px rgba(16,24,40,0.04), 0 6px 16px rgba(16,24,40,0.06);
  --font-display:'IBM Plex Sans',-apple-system,sans-serif;
  --font-body:'IBM Plex Sans',-apple-system,sans-serif;
  --font-mono:'IBM Plex Mono','Courier New',monospace;
  --input-bg:#FAFBFD;
}
[data-theme="dark"]{
  --bg:#13151F; --surface:#1B1E2B; --ink:#EDEEF5; --ink-soft:#9AA0B4; --border:#2A2E40;
  --primary:#7C7AFF; --primary-dark:#9290FF; --primary-soft:#272650;
  --green:#3DCB8F; --green-soft:#163428; --red:#FF6B61; --red-soft:#3A1E1E;
  --amber:#E0A53D; --amber-soft:#3A2E12;
  --shadow:0 1px 2px rgba(0,0,0,0.3), 0 6px 18px rgba(0,0,0,0.35);
  --input-bg:#22253A;
}
[data-theme="dark"] body{ background:var(--bg); }
[data-theme="dark"] .login-card input,
[data-theme="dark"] .form-grid input, [data-theme="dark"] .form-grid select, [data-theme="dark"] .form-grid textarea{
  background:var(--input-bg); color:var(--ink); border-color:var(--border);
}
[data-theme="dark"] .id-card{ color:#1E2230; } /* printed ID cards stay light/printable regardless of theme */
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:var(--font-body); color:var(--ink); background:var(--bg); min-height:100vh;}
button,input,select,textarea{font-family:inherit; font-size:14px;}
h1,h2,h3,h4{font-family:var(--font-display); font-weight:700; margin:0 0 .4em 0; color:var(--ink);}
.mono{font-family:var(--font-mono);}
.muted{color:var(--ink-soft); font-size:13px;}
a{color:var(--primary);}

.login-screen{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;}
.login-card{background:var(--surface); border:1px solid var(--border); border-radius:20px; box-shadow:var(--shadow); padding:38px 34px; width:100%; max-width:420px;}
.brand{display:flex; align-items:center; gap:12px;}
.brand-center{justify-content:center; flex-direction:column; text-align:center; margin-bottom:8px;}
.brand-mark{width:44px; height:44px; border-radius:12px; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:19px; flex-shrink:0; box-shadow:0 4px 10px rgba(79,70,229,.3);}
.brand-text{font-weight:800; font-size:19px; line-height:1.15;}
.login-tagline{text-align:center; color:var(--ink-soft); font-size:13px; margin:0 0 24px;}
.login-card label{display:block; font-size:11px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.05em; margin-bottom:16px;}
.login-card input{width:100%; margin-top:6px; padding:11px 12px; border:1.5px solid var(--border); border-radius:10px; background:var(--input-bg); outline:none; font-size:15px; color:var(--ink);}
.login-card input:focus{border-color:var(--primary); background:#fff;}
.login-error{background:var(--red-soft); color:var(--red); border:1px solid #F6CFCB; border-radius:10px; padding:10px 12px; font-size:13px; margin-bottom:16px;}
.login-hint{font-size:12px; color:var(--ink-soft); margin-top:16px; text-align:center; line-height:1.5;}
.loading-screen{min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; color:var(--ink-soft);}
.loading-mark{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));}
.fatal-error{max-width:480px; margin:80px auto; text-align:center; padding:24px;}
.setup-note{background:var(--primary-soft); border:1px solid #D9D6FB; border-radius:10px; padding:10px 12px; font-size:12.5px; color:#41399A; line-height:1.5; margin-bottom:18px;}

.btn{border:none; border-radius:10px; padding:10px 17px; font-size:14px; font-weight:600; cursor:pointer; transition:transform .05s ease, opacity .15s ease, background .15s ease, color .15s ease, border-color .15s ease, box-shadow .15s ease;}
.btn:active{transform:translateY(1px);}
.btn:disabled{opacity:.55; cursor:default;}
.btn-primary{background:var(--primary); color:#fff; box-shadow:0 2px 8px rgba(79,70,229,.25);}
.btn-primary:hover{background:var(--primary-dark);}
.btn-secondary{background:#fff; color:var(--ink); border:1.5px solid var(--border);}
.btn-secondary:hover{border-color:var(--primary); color:var(--primary);}
.btn-ghost{background:transparent; color:var(--ink-soft); border:1px solid transparent;}
.btn-ghost:hover{color:var(--ink); background:#EEF0F4;}
.btn-danger{background:var(--red); color:#fff;}
.btn-amber{background:var(--amber); color:#fff;}
.btn-block{width:100%;}
.btn-lg{padding:14px 26px; font-size:16px;}
.btn-sm{padding:6px 11px; font-size:12.5px; border-radius:8px;}
.link-btn{background:none; border:none; color:var(--primary); font-size:13px; cursor:pointer; padding:0; font-weight:600;}

.app-shell{display:flex; min-height:100vh;}
.sidebar{width:212px; flex-shrink:0; background:var(--ink); color:#fff; display:flex; flex-direction:column; padding:20px 0;}
.sidebar .brand{padding:0 20px 20px; color:#fff;}
.sidebar .brand-text{color:#fff;}
.nav-item{display:flex; align-items:center; justify-content:space-between; width:100%; text-align:left; background:none; border:none; color:#A6ACC2; padding:11px 20px; font-size:14px; cursor:pointer; border-left:3px solid transparent; font-weight:500;}
.nav-item:hover{color:#fff; background:rgba(255,255,255,.05);}
.nav-item.active{color:#fff; background:rgba(255,255,255,.08); border-left-color:var(--primary); font-weight:700;}
.nav-badge{background:var(--red); color:#fff; font-size:10px; font-weight:800; border-radius:20px; padding:2px 7px;}
.main-col{flex:1; min-width:0; display:flex; flex-direction:column;}
.topbar{display:flex; align-items:center; justify-content:space-between; background:var(--surface); border-bottom:1px solid var(--border); padding:16px 26px; flex-wrap:wrap; gap:8px;}
.topbar-title{font-size:19px; font-weight:800;}
.topbar-user{display:flex; align-items:center; gap:11px; font-size:13px; flex-wrap:wrap;}
.role-badge{font-size:10px; text-transform:uppercase; letter-spacing:.05em; padding:4px 9px; border-radius:20px; font-weight:700;}
.role-admin{background:var(--primary-soft); color:var(--primary-dark);}
.role-accountant{background:var(--green-soft); color:var(--green);}
.role-gatekeeper{background:var(--amber-soft); color:var(--amber);}
.user-name{font-weight:700;}
.account-icon-btn{width:30px; height:30px; border-radius:50%; border:1px solid var(--border); background:#fff; cursor:pointer; font-size:14px; line-height:1;}
.account-icon-btn:hover{border-color:var(--primary); color:var(--primary);}
.main{padding:26px; overflow-y:auto;}
@media (max-width:760px){
  .app-shell{flex-direction:column;}
  .sidebar{width:100%; flex-direction:row; overflow-x:auto; padding:8px;}
  .sidebar .brand{display:none;}
  .nav-item{flex:0 0 auto; border-left:none; border-bottom:3px solid transparent; white-space:nowrap;}
  .nav-item.active{border-left:none; border-bottom-color:var(--primary);}
  .topbar{padding:14px 16px;}
  .main{padding:16px;}
}

.acc-shell{display:flex; flex-direction:column; min-height:100vh;}

  const res = await fetch(`${state.sbUrl}/auth/v1/user`, { method:'PUT', headers:{ apikey:state.sbAnonKey, Authorization:`Bearer ${token}`, 'Content-Type':'application/json' }, body: JSON.stringify({ password:newPassword }) });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error_description || data.msg || 'Could not update password.');
  return data;
}

/* ============================================================
   HELPERS
   ============================================================ */
function esc(str){ return String(str==null?'':str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function escAttr(str){ return String(str==null?'':str).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function safeId(str){ return 'id'+String(str).replace(/[^a-zA-Z0-9]/g,'_'); }
function initials(name){ return String(name||'?').split(/\s+/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('') || '?'; }
function avatarColor(name){
  const colors=['#4F46E5','#1F9D6F','#E0483E','#0E7490','#7C3AED','#C9810A']; let hash=0; const s=String(name||'');
  for(let i=0;i<s.length;i++){ hash=(hash*31+s.charCodeAt(i))%colors.length; } return colors[Math.abs(hash)%colors.length];
}
function fmtTime(ts){ if(!ts) return '—'; return new Date(ts).toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
function fmtMoney(n){ return '₹' + (Number(n)||0).toLocaleString('en-IN'); }
function csvEscape(v){ v = v==null?'':String(v); if(/[",\n]/.test(v)) return '"'+v.replace(/"/g,'""')+'"'; return v; }
function downloadTextFile(content, filename, mime){
  const blob = new Blob([content],{type:mime}); const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=filename; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function parseContacts(raw){
  if (Array.isArray(raw)) return raw;
  if (typeof raw === 'string'){ try{ const p = JSON.parse(raw); return Array.isArray(p)?p:[]; }catch(e){ return []; } }
  return [];
}
function hasPerm(p){ return !!(state.user && state.user.permissions && state.user.permissions[p]); }
function canDo(p){ return state.user && (state.user.role==='admin' || (state.user.role==='accountant' && hasPerm(p))); }
function filterByDate(list, from, to, field){
  if (!from && !to) return list;
  return list.filter(item=>{
    const raw = item[field]; if (!raw) return false;
    const d = new Date(raw);
    if (from && d < new Date(from+'T00:00:00')) return false;
    if (to && d > new Date(to+'T23:59:59')) return false;
    return true;
  });
}
function computeStats(){
  const totalStudents = state.students.length;
  const totalDue = state.students.reduce((sum,s)=>sum+Math.max(0,(s.fee_total||0)-(s.fee_paid||0)),0);
  const totalCollected = state.students.reduce((sum,s)=>sum+(s.fee_paid||0),0);
  const totalAccountants = state.accounts.filter(a=>a.role==='accountant').length;
  const totalOut = state.leaves.filter(l=>l.status==='out').length;
  const fullyPaid = state.students.filter(s=>(s.fee_total||0)<=(s.fee_paid||0)).length;
  const male = state.students.filter(s=>s.gender==='male').length;
  const female = state.students.filter(s=>s.gender==='female').length;
  return { totalStudents, totalDue, totalCollected, totalAccountants, totalOut, fullyPaid, male, female, present: totalStudents-totalOut };
}
function sortStudentsList(list){
  const arr = [...list];
  if (state.sortBy==='name') arr.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  else if (state.sortBy==='roll') arr.sort((a,b)=>(a.roll_no||'').localeCompare(b.roll_no||''));
  else if (state.sortBy==='room') arr.sort((a,b)=>(a.room||'').localeCompare(b.room||''));
  else if (state.sortBy==='due_desc') arr.sort((a,b)=>(((b.fee_total||0)-(b.fee_paid||0))-((a.fee_total||0)-(a.fee_paid||0))));
  else if (state.sortBy==='newest') arr.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  return arr;
}
function filteredStudents(){
  const q = (state.search||'').trim().toLowerCase();
  let list = state.students;
  if (q) list = list.filter(s => (s.roll_no||'').toLowerCase().includes(q) || (s.name||'').toLowerCase().includes(q) || (s.room||'').toLowerCase().includes(q) || (s.course||'').toLowerCase().includes(q));
  if (state.duesFilter==='due') list = list.filter(s=>(s.fee_total||0)>(s.fee_paid||0));
  else if (state.duesFilter==='paid') list = list.filter(s=>(s.fee_total||0)<=(s.fee_paid||0));
  return sortStudentsList(list);
}
function leaveForStudent(studentId){
  const mine = state.leaves.filter(l=>l.student_id===studentId && (l.status==='approved'||l.status==='out'));
  return mine.length ? mine[0] : null;
}
function leaveBadgeClass(status){ return status==='out'?'out':status==='completed'?'completed':status==='cancelled'?'cancelled':'approved'; }
function activityLabel(t){

    student_archive:'Moved to recycle bin', student_restore:'Restored', student_purge:'Permanently deleted',
    leave_granted:'Leave granted', leave_out:'Marked out', leave_in:'Marked in' };

}
function capitalizeTab(t){
  const map={ dashboard:'Dashboard', students:'Students', leaves:'Leaves', transactions:'Transactions', staff:'Staff',
    requests:'Login Requests', activity:'Activity Log', scan:'Scan', myactivity:'My Activity', gate:'Gate', roster:'Leave Roster' };

}
function renderQRInto(elementId, text){

  el.innerHTML=''; new QRCode(el, { text, width:150, height:150, correctLevel: QRCode.CorrectLevel.M });

function buzz(pattern){ try{ if (navigator.vibrate) navigator.vibrate(pattern); }catch(e){} }
function localDateStr(d){
  d = d || new Date();
  const tzOffsetMs = d.getTimezoneOffset() * 60000;
  return new Date(d.getTime() - tzOffsetMs).toISOString().slice(0,10);
}
function currentScanMode(){

/* ============================================================
   RENDER + UPDATE (+ centralized post-render side effects —
   this is what fixes QR codes / photos disappearing after a
   re-render triggered by an async data load)
   ============================================================ */
function render(){
  const app = document.getElementById('app'); if (!app) return;
  if (state.view==='loading') app.innerHTML = renderLoading();
  else if (state.view==='setup') app.innerHTML = renderSetup();
  else if (state.view==='login') app.innerHTML = renderLogin();
  else if (state.view==='waiting-approval') app.innerHTML = renderWaitingApproval();
  else if (state.view==='app'){
    if (state.user.role==='admin') app.innerHTML = renderAdminShell();
    else if (state.user.role==='gatekeeper') app.innerHTML = renderGateShell();
    else app.innerHTML = renderAccountantShell();
  }
}
function update(){
  const active = document.activeElement;
  const activeId = active && active.id;
  const selStart = active && typeof active.selectionStart==='number' ? active.selectionStart : null;
  const selEnd = active && typeof active.selectionEnd==='number' ? active.selectionEnd : null;
  render();
  if (activeId){ const el=document.getElementById(activeId); if (el){ el.focus(); if (selStart!==null && el.setSelectionRange){ try{ el.setSelectionRange(selStart,selEnd); }catch(e){} } } }
  runPostRenderEffects();
}
function applyPhoto(elementId, student, cacheHolder){
  const holder = document.getElementById(elementId);
  if (!holder || !student || !student.photo_path) return;
  if (cacheHolder._photoUrl){ holder.innerHTML = `<img src="${cacheHolder._photoUrl}" alt="" />`; return; }
  sbSignedUrl('student-photos', student.photo_path, 600).then(url=>{
    if (!url) return;
    cacheHolder._photoUrl = url;
    const h = document.getElementById(elementId);
    if (h) h.innerHTML = `<img src="${url}" alt="" />`;
  }).catch(()=>{});
}
function runPostRenderEffects(){
  if (state.modal && state.modal.type==='profile'){
    renderQRInto('qr-canvas-holder', state.modal.student.roll_no);
    applyPhoto('profile-photo-holder', state.modal.student, state.modal);
  }
  if (state.modal && state.modal.type==='studentForm' && state.modal.existing){
    applyPhoto('photo-preview-holder', state.modal.existing, state.modal);
  }
  if (state.gateResult && state.gateResult.found){
    applyPhoto('gate-photo-holder', state.gateResult.student, state.gateResult);
  }
  loadPhotosForVisibleCards();
  loadRosterPhotos();
}
function toast(message, kind){
  kind = kind||'success'; state.toast = { message, kind, id: Date.now() }; update();
  const myId = state.toast.id;
  setTimeout(()=>{ if (state.toast && state.toast.id===myId){ state.toast=null; update(); } }, 3200);
}
function renderToast(){ if(!state.toast) return ''; return `<div class="toast toast-${state.toast.kind}">${esc(state.toast.message)}</div>`; }
function closeModal(){ state.modal=null; update(); }
function confirmAction(message, callback){ pendingConfirmCallback=callback; state.modal={type:'confirm',message}; update(); }
function openRowDetail(title, fields, actionsHtml){ state.modal = { type:'rowDetail', title, fields, actionsHtml: actionsHtml||'' }; update(); }

function renderWaitingApproval(){
  return `<div class="login-screen"><div class="login-card" style="text-align:center;">
    <div class="brand brand-center"><div class="brand-mark">H</div><div class="brand-text">Hostel Register</div></div>
    <h3>Waiting for approval</h3>
    <p class="muted">An admin needs to approve this login before you can continue. Keep this page open — it'll continue automatically once approved.</p>
    <button class="btn btn-ghost" onclick="cancelApprovalWait()">Cancel</button>
  </div></div>`;
}
function cancelApprovalWait(){
  if (approvalPollInterval){ clearInterval(approvalPollInterval); approvalPollInterval=null; }
  clearSession(); state.user=null; state.view='login'; update();
}
async function attemptLogin(){
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password){ state.loginError='Enter both email and password.'; update(); return; }
  const btn = document.getElementById('login-submit-btn'); if (btn){ btn.disabled=true; btn.textContent='Signing in…'; }
  try{
    const data = await sbSignIn(email, password);
    session = { access_token:data.access_token, refresh_token:data.refresh_token, expires_at: Date.now()+data.expires_in*1000, user:data.user };
    await persistSession();
    await loadMyProfile();
    state.loginError = null;
    if (state.user.role === 'admin'){
      state.view='app'; state.adminTab='dashboard'; state.accTab='scan'; state.gateTab='gate';
      await loadAllForRole();
      update();
    } else {
      await requestLoginApproval();
      state.view='waiting-approval';
      update();
      startApprovalPolling();
    }
  }catch(e){
    await clearSession();
    state.loginError = e.message==='inactive' ? 'Your account has been disabled. Contact your administrator.' : (e.message||'Login failed.');
    update();
  }
}
async function requestLoginApproval(){
  const device = (navigator.userAgent||'unknown device').slice(0,180);
  const inserted = await sbInsert('login_requests', { user_id: state.user.id, email: state.user.email, device_info: device, status:'pending' });
  state.myLoginRequestId = inserted[0].id;
}
function startApprovalPolling(){
  if (approvalPollInterval) clearInterval(approvalPollInterval);
  approvalPollInterval = setInterval(async ()=>{
    try{
      const rows = await sbSelect('login_requests', `?id=eq.${state.myLoginRequestId}&select=status`);
      const status = rows && rows[0] && rows[0].status;
      if (status==='approved'){
        clearInterval(approvalPollInterval); approvalPollInterval=null;
        state.view='app'; state.adminTab='dashboard'; state.accTab='scan'; state.gateTab='gate';
        await loadAllForRole();
        update();
      } else if (status==='denied'){
        clearInterval(approvalPollInterval); approvalPollInterval=null;
        await clearSession(); state.user=null; state.view='login';
        state.loginError='Your login was denied by the admin.';
        update();
      }
    }catch(e){}
  }, 4000);
}
async function loadMyProfile(){
  const rows = await sbSelect('profiles', `?id=eq.${session.user.id}&select=*`);
  const profile = rows && rows[0];
  if (!profile || profile.active===false) throw new Error('inactive');
  state.user = { id: profile.id, email: profile.email, name: profile.name||profile.email, role: profile.role, permissions: profile.permissions||{} };
}
function logout(){ stopCamera(); if (approvalPollInterval){ clearInterval(approvalPollInterval); approvalPollInterval=null; } clearSession(); state.user=null; state.view='login'; state.scanResult=null; state.gateResult=null; state.scanning=false; update(); }
async function loadAllForRole(){
  if (state.user.role==='admin') await Promise.all([loadStudents(), loadProfiles(), loadActivity(), loadLeaves(), loadBatches(), loadLoginRequests()]);
  else if (state.user.role==='accountant') await Promise.all([loadStudents(), loadActivity(), loadLeaves(), loadBatches()]);
  else await loadActivity();
}

async function addBatch(){
  const name = document.getElementById('batch-name').value.trim();
  const shortCode = document.getElementById('batch-shortcode').value.trim();
  const monthly = parseFloat(document.getElementById('batch-monthly').value)||0;
  const onetime = parseFloat(document.getElementById('batch-onetime').value)||0;
  if (!name){ toast('Enter a batch name.','error'); return; }
  try{ await sbInsert('batches',{name, short_code:shortCode||null, monthly_fee_amount:monthly, onetime_fee_amount:onetime}); toast('Batch added.','success'); await loadBatches(); }
  catch(e){ toast(e.message,'error'); }
  update();
}
function deleteBatch(id){
  confirmAction('Delete this batch? Students already assigned to it keep their current fee settings.', async ()=>{
    try{ await sbDelete('batches', `?id=eq.${id}`); toast('Batch deleted.','success'); await loadBatches(); }
    catch(e){ toast(e.message,'error'); }
    update();
  });
}
function onBatchChange(){ applyBatchFeeAmount(); }
function applyBatchFeeAmount(){
  const batchId = document.getElementById('f-batch').value;
  const batch = state.batches.find(b=>b.id===batchId);
  if (!batch) return;
  const mode = document.getElementById('f-feemode').value;
  const amount = mode==='monthly' ? batch.monthly_fee_amount : batch.onetime_fee_amount;
  if (amount) document.getElementById('f-feetotal').value = amount;
}

function openBatchAssignModal(batchId){ state.modal = { type:'batchAssign', batchId, search:'', changes:{} }; update(); }
function batchAssignModalHTML(m){

  return `<div class="modal-overlay" onclick="if(event.target===this) closeModal()"><div class="modal modal-lg">

    <div class="select-all-row">
      <label style="display:flex; align-items:center; gap:8px; cursor:pointer;"><input type="checkbox" ${allChecked?'checked':''} onchange="toggleBatchAssignAll(this.checked)" /> Select all shown (${list.length})</label>
      <span class="muted">${Object.keys(m.changes).length} change(s) pending</span>
    </div>

        const checked = m.changes.hasOwnProperty(s.id) ? m.changes[s.id] : (s.batch_id===m.batchId);
        return `<label style="display:flex; align-items:center; gap:10px; padding:9px 14px; border-bottom:1px solid var(--border); cursor:pointer;">
          <input type="checkbox" ${checked?'checked':''} onchange="toggleBatchAssignStudent('${escAttr(s.id)}', this.checked)" />
          <span>${esc(s.name)} <span class="mono muted">${esc(s.roll_no)}</span></span>
        </label>`;
      }).join('') : '<p class="empty-hint">No students match.</p>'}
    </div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="batch-assign-btn" onclick="submitBatchAssign()">Save assignments</button></div>
  </div></div>`;
}
function onBatchAssignSearch(v){ state.modal.search=v; update(); }
function toggleBatchAssignStudent(studentId, checked){ state.modal.changes[studentId]=checked; }
function toggleBatchAssignAll(checked){
  const q = (state.modal.search||'').trim().toLowerCase();
  const list = state.students.filter(s=> !q || s.name.toLowerCase().includes(q) || s.roll_no.toLowerCase().includes(q));
  list.forEach(s=>{ state.modal.changes[s.id]=checked; });
  update();
}
async function submitBatchAssign(){
  const batchId = state.modal.batchId;
  const changes = state.modal.changes;
  const ids = Object.keys(changes);
  if (!ids.length){ toast('No changes to save.','success'); closeModal(); return; }
  const btn = document.getElementById('batch-assign-btn'); if (btn){ btn.disabled=true; btn.textContent='Saving…'; }
  try{
    for (let i=0; i<ids.length; i+=10){
      const chunk = ids.slice(i, i+10);
      await Promise.all(chunk.map(id => sbUpdate('students', `?id=eq.${id}`, { batch_id: changes[id] ? batchId : null })));
    }
    toast(`Updated ${ids.length} student(s).`,'success');
    await loadStudents();
    closeModal();
  }catch(e){ toast(e.message,'error'); if (btn){ btn.disabled=false; btn.textContent='Save assignments'; } }
}

async function submitStudentForm(){
  syncContactsFromDOM();
  const originalRollNo = state.modal && state.modal.originalRollNo;
  const rollNo = document.getElementById('f-rollno').value.trim();
  const name = document.getElementById('f-name').value.trim();
  const room = document.getElementById('f-room').value.trim();
  const course = document.getElementById('f-course').value.trim();
  const gender = document.getElementById('f-gender').value || null;
  const batchId = document.getElementById('f-batch').value || null;
  const father = document.getElementById('f-father').value.trim();
  const mother = document.getElementById('f-mother').value.trim();
  const address = document.getElementById('f-address').value.trim();
  const feeMode = document.getElementById('f-feemode').value;
  const feeTotal = parseFloat(document.getElementById('f-feetotal').value) || 0;
  const photoFile = document.getElementById('f-photo').files[0];
  const contacts = (state.modal.contacts||[]).filter(c=>c.phone && c.phone.trim());
  if (!rollNo || !name){ toast('Roll number and name are required.','error'); return; }
  const btn = document.getElementById('student-save-btn'); if (btn){ btn.disabled=true; btn.textContent='Saving…'; }
  try{
    const payload = { name, room, course, gender, batch_id:batchId, father_name:father, mother_name:mother, address, contacts, fee_mode:feeMode, fee_total:feeTotal };
    if (!originalRollNo){
      payload.fee_paid = 0;
      const inserted = await sbInsert('students', Object.assign({ roll_no: rollNo }, payload));
      const row = inserted[0];
      if (photoFile){ const path = await uploadStudentPhoto(row.id, photoFile); await sbUpdate('students', `?id=eq.${row.id}`, { photo_path: path }); }
      const initialPaid = parseFloat(document.getElementById('f-feepaid').value) || 0;
      if (initialPaid > 0){
        const method = document.getElementById('f-paymethod').value;
        const uid = document.getElementById('f-payuid') ? document.getElementById('f-payuid').value.trim() : '';
        const bank = document.getElementById('f-paybank') ? document.getElementById('f-paybank').value.trim() : '';
        try{ await sbRpc('record_initial_payment', { p_roll_no: rollNo, p_amount: initialPaid, p_method: method, p_uid: uid, p_bank: bank }); }
        catch(payErr){ toast('Student added, but the initial payment could not be recorded: '+payErr.message, 'error'); }
      }
      await sbInsert('activity_log', { type:'student_add', roll_no: rollNo, details:`${name} (${rollNo})`, by_name: state.user.name });
      toast('Student added.','success');
    } else {
      const row = state.students.find(s=>s.roll_no.toLowerCase()===originalRollNo.toLowerCase());
      const patch = Object.assign({}, payload);
      if (photoFile){ patch.photo_path = await uploadStudentPhoto(row.id, photoFile); }
      await sbUpdate('students', `?id=eq.${row.id}`, patch);
      await sbInsert('activity_log', { type:'student_edit', roll_no: rollNo, details:`${name} (${rollNo})`, by_name: state.user.name });
      toast('Student updated.','success');
    }
    closeModal();
    await Promise.all([loadStudents(), loadActivity()]);
    update();
  }catch(e){ toast(e.message,'error'); if (btn){ btn.disabled=false; btn.textContent = originalRollNo?'Save changes':'Add student'; } }
}
async function uploadStudentPhoto(studentId, file){
  const ext = ((file.name.split('.').pop()||'jpg').toLowerCase().replace(/[^a-z0-9]/g,'')) || 'jpg';
  return await sbUploadFile('student-photos', `${studentId}.${ext}`, file);
}

/* ============================================================
   ARCHIVE / RESTORE / PURGE (recycle bin)
   ============================================================ */
function openArchiveModal(rollNo){ state.modal = { type:'archive', rollNo }; update(); }
function archiveModalHTML(rollNo){
  return `<div class="modal-overlay" onclick="if(event.target===this) closeModal()">
    <div class="modal">
      <h3>Move to recycle bin</h3>
      <div class="form-grid">
        <label>Reason<select id="archive-reason">
          <option value="fee_refunded">Fee refunded</option>
          <option value="left_hostel">Left the hostel</option>
          <option value="other">Other</option>
        </select></label>
        <label>Note (optional)<textarea id="archive-note" rows="2"></textarea></label>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-danger" onclick="submitArchive('${escAttr(rollNo)}')">Move to recycle bin</button>
      </div>
    </div>
  </div>`;
}
async function submitArchive(rollNo){
  const reason = document.getElementById('archive-reason').value;
  const note = document.getElementById('archive-note').value.trim();
  try{
    const row = state.students.find(s=>s.roll_no.toLowerCase()===rollNo.toLowerCase());
    if (!row) throw new Error('Student not found.');
    await sbUpdate('students', `?id=eq.${row.id}`, { archived:true, archived_reason: reason + (note?` — ${note}`:''), archived_at: new Date().toISOString(), archived_by: state.user.name });
    await sbInsert('activity_log', { type:'student_archive', roll_no: rollNo, details:`${row.name} — ${reason}${note?': '+note:''}`, by_name: state.user.name });
    closeModal();
    toast('Moved to recycle bin.','success');
    await Promise.all([loadStudents(), loadActivity()]);
  }catch(e){ toast(e.message,'error'); }
  update();
}
function restoreStudent(rollNo){
  confirmAction(`Restore ${rollNo} from the recycle bin?`, async ()=>{
    try{
      const row = state.students.find(s=>s.roll_no.toLowerCase()===rollNo.toLowerCase());
      await sbUpdate('students', `?id=eq.${row.id}`, { archived:false, archived_reason:null, archived_at:null, archived_by:null });
      await sbInsert('activity_log', { type:'student_restore', roll_no: rollNo, details:`Restored ${rollNo}`, by_name: state.user.name });
      toast('Student restored.','success');
      await Promise.all([loadStudents(), loadActivity()]);
    }catch(e){ toast(e.message,'error'); }
    update();
  });
}
function purgeStudent(rollNo){
  confirmAction(`Permanently delete ${rollNo}? This cannot be undone — all records, payments and history for this student will be erased.`, async ()=>{
    try{
      const row = state.students.find(s=>s.roll_no.toLowerCase()===rollNo.toLowerCase());
      await sbDelete('students', `?id=eq.${row.id}`);
      await sbInsert('activity_log', { type:'student_purge', roll_no: rollNo, details:`Permanently deleted ${rollNo}`, by_name: state.user.name });
      toast('Student permanently deleted.','success');
      await Promise.all([loadStudents(), loadActivity()]);
    }catch(e){ toast(e.message,'error'); }
    update();
  });
}

      <button class="link-btn" onclick="downloadCSVTemplate()">Download template</button>
      <textarea id="csv-textarea" class="csv-textarea" rows="10" placeholder="BCA2024015,Aman Kumar,B-12,BCA,male,24I,Ram Kumar,Sita Devi,123 MG Road Patna,Student:9876543210;Father:9123456780,onetime,60000,30000"></textarea>

        <button class="btn btn-primary" id="import-btn" onclick="parseAndImportCSV()">Import</button>

function downloadCSVTemplate(){
  downloadTextFile('RollNo,Name,Room,Course,Gender,Batch,FatherName,MotherName,Address,Contacts,FeeMode,FeeTotal,FeePaid\nBCA2024015,Aman Kumar,B-12,BCA,male,24I,Ram Kumar,Sita Devi,123 MG Road Patna,Student:9876543210;Father:9123456780,onetime,60000,30000', 'student-import-template.csv', 'text/csv');
}
function parseContactsField(raw){
  if (!raw) return [];
  return raw.split(';').map(part=>part.trim()).filter(Boolean).map(part=>{
    const idx = part.indexOf(':');
    if (idx===-1) return { label:'Contact', phone:part.trim() };
    return { label: part.slice(0,idx).trim()||'Contact', phone: part.slice(idx+1).trim() };
  }).filter(c=>c.phone);
}
function findBatchByCodeOrName(text){
  if (!text) return null;
  const q = text.trim().toLowerCase();
  if (!q) return null;
  return state.batches.find(b=> (b.short_code||'').toLowerCase()===q || b.name.toLowerCase()===q) || null;
}
async function parseAndImportCSV(){
  const raw = document.getElementById('csv-textarea').value;
  const lines = raw.split('\n').map(l=>l.trim()).filter(l=>l.length>0);
  const btn = document.getElementById('import-btn'); if (btn){ btn.disabled=true; btn.textContent='Importing…'; }
  let added=0, skipped=0, batchMisses=0;
  const existingRolls = new Set(state.students.map(s=>s.roll_no.toLowerCase()));
  const rowsToInsert = [];
  const initialPayments = []; // {rollNo, amount}
  lines.forEach((line,i)=>{
    if (i===0 && /roll/i.test(line) && /name/i.test(line)) return;
    const parts = line.split(',').map(p=>p.trim());
    const [rollNo,name,room,course,gender,batchText,father,mother,address,contactsText,feeMode,feeTotal,feePaid] = parts;
    if (!rollNo || !name || existingRolls.has(rollNo.toLowerCase())){ skipped++; return; }
    const batch = findBatchByCodeOrName(batchText);
    if (batchText && !batch) batchMisses++;
    const paidAmount = parseFloat(feePaid)||0;
    if (paidAmount>0) initialPayments.push({ rollNo, amount:paidAmount });
    rowsToInsert.push({ roll_no:rollNo, name, room:room||'', course:course||'',
      gender: ['male','female','other'].includes((gender||'').toLowerCase()) ? gender.toLowerCase() : null,
      batch_id: batch?batch.id:null,
      father_name:father||'', mother_name:mother||'', address:address||'',
      contacts: parseContactsField(contactsText),
      fee_mode: (feeMode==='monthly'?'monthly':'onetime'),
      fee_total:parseFloat(feeTotal)||0, fee_paid:0 });
    existingRolls.add(rollNo.toLowerCase());
    added++;
  });
  try{
    if (rowsToInsert.length) await sbInsert('students', rowsToInsert);
    if (initialPayments.length){
      toast(`Adding ${added} student(s) — recording ${initialPayments.length} initial payment(s)…`,'success');
      for (let i=0; i<initialPayments.length; i+=10){
        const chunk = initialPayments.slice(i, i+10);
        await Promise.all(chunk.map(p => sbRpc('record_initial_payment', { p_roll_no:p.rollNo, p_amount:p.amount, p_method:'cash', p_uid:'', p_bank:'' }).catch(()=>{})));
      }
    }
    await sbInsert('activity_log', { type:'student_add', details:`Bulk import: ${added} added, ${skipped} skipped${batchMisses?`, ${batchMisses} batch reference(s) not found`:''}`, by_name: state.user.name });
    closeModal();
    toast(`${added} student(s) added${skipped?`, ${skipped} skipped`:''}${batchMisses?`, ${batchMisses} batch code(s) not matched`:''}.`,'success');
    await Promise.all([loadStudents(), loadActivity()]);
  }catch(e){ toast(e.message,'error'); }
  update();
}
function exportCSV(){
  const header = 'RollNo,Name,Room,Course,Gender,Batch,FatherName,MotherName,Address,Contacts,FeeMode,FeeTotal,FeePaid';
  const rows = state.students.map(s=>{
    const batch = state.batches.find(b=>b.id===s.batch_id);
    const contacts = parseContacts(s.contacts).map(c=>`${c.label}:${c.phone}`).join(';');
    return [s.roll_no,s.name,s.room,s.course,s.gender||'',batch?(batch.short_code||batch.name):'',s.father_name,s.mother_name,s.address,contacts,s.fee_mode,s.fee_total,s.fee_paid].map(csvEscape).join(',');
  });
  downloadTextFile([header,...rows].join('\n'), 'hostel-students-backup.csv', 'text/csv');
}

function renderLeaveRow(l){

/* ============================================================
   ATTENDANCE — scan once per student per day; a repeat scan
   the same day is rejected with a clear error (date-wise, in
   the student's local calendar day, not the server's).
   ============================================================ */
function computeAttendanceGenderStats(markedList){
  const activeStudents = state.students.filter(s=>!s.archived);
  const outIds = new Set(state.leaves.filter(l=>l.status==='out').map(l=>l.student_id));
  const markedByStudent = {}; markedList.forEach(a=>{ markedByStudent[a.student_id] = a; });
  const s = { malePresent:0, femalePresent:0, maleInCampus:0, femaleInCampus:0, maleOut:0, femaleOut:0, maleAbsent:0, femaleAbsent:0, absentList:[] };
  activeStudents.forEach(st=>{
    const g = st.gender;
    const isOut = outIds.has(st.id);
    const isMarked = !!markedByStudent[st.id];
    if (g==='male' || g==='female'){
      if (isMarked){ if (g==='male') s.malePresent++; else s.femalePresent++; }
      if (isOut){ if (g==='male') s.maleOut++; else s.femaleOut++; }
      else {
        if (g==='male') s.maleInCampus++; else s.femaleInCampus++;
        if (!isMarked){ if (g==='male') s.maleAbsent++; else s.femaleAbsent++; }
      }
    }
    if (!isOut && !isMarked) s.absentList.push(st);
  });
  return s;
}

  const list = state._attendanceList || [];

  const gs = computeAttendanceGenderStats(list);
  return `

    ${state.scanning ? `
      <div class="scan-frame">
        <div id="qr-reader"></div><div class="frame-corners"></div>
        ${state.attFeedback ? `<div class="scan-feedback ${state.attFeedback.type==='success'?'scan-feedback-ok':'scan-feedback-err'}">

      </div>
      <p class="muted">Keep scanning — each new student is marked instantly. Tap Stop when done.</p>
      <button class="btn btn-ghost" onclick="cancelScan()">Stop scanning</button>${renderManualEntry()}
    ` : `
      <div class="scan-hero"><div class="scan-hero-icon">📋</div><h2>Take attendance</h2>
      <p class="muted">Scan each student's ID to mark them present for today. Out-of-campus or already-marked students show a clear error instead.</p>
      <button class="btn btn-primary btn-lg" onclick="startScan()">Start camera scan</button></div>${renderManualEntry()}
    `}
  </div>
  <div class="toolbar">
    <div class="manual-row"><label class="muted" style="align-self:center;">Viewing:</label><input type="date" class="date-input" value="${dateStr}" onchange="setAttDate(this.value)" /> ${!isToday? `<button class="link-btn" onclick="setAttDate('${localDateStr()}')">Jump to today</button>` : ''}</div>
    <div class="toolbar-actions"><span class="muted">${list.length} of ${totalActive} active students marked present</span></div>
  </div>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-num">${gs.malePresent}</div><div class="stat-label">♂ Male present</div></div>
    <div class="stat-card"><div class="stat-num">${gs.femalePresent}</div><div class="stat-label">♀ Female present</div></div>

  </div>

    <div class="stat-card stat-out"><div class="stat-num">${gs.femaleOut}</div><div class="stat-label">♀ Female on leave (out)</div></div>
    <div class="stat-card stat-due"><div class="stat-num">${gs.maleAbsent}</div><div class="stat-label">♂ Male absent</div></div>

async function markAttendance(code){
  const normalized = String(code).trim();
  if (!normalized){ toast('Enter a roll number first.','error'); return; }
  try{
    let rows = state.students.filter(s=>s.roll_no.toLowerCase()===normalized.toLowerCase());
    if (!rows.length){ await loadStudents(); rows = state.students.filter(s=>s.roll_no.toLowerCase()===normalized.toLowerCase()); }
    if (!rows.length){
      buzz([30,30,30]);
      if (state.scanning) showAttFeedback('error', `No match: ${normalized}`); else toast(`No student matches code "${normalized}".`,'error');
      return;
    }
    const student = rows[0];
    const today = localDateStr();
    await sbRpc('mark_attendance', { p_roll_no: student.roll_no, p_date: today });
    buzz(60);
    if (state.scanning) showAttFeedback('success', student.name); else toast(`✓ ${student.name} marked present.`,'success');
    state.attDate = today;
    const list = await loadAttendanceForDate(today);
    state._attendanceList = list;
    update();
  }catch(e){
    buzz([30,30,30]);
    if (state.scanning) showAttFeedback('error', e.message); else toast(e.message,'error');
  }
}

function toggleAccountActive(id, currentlyActive){
  confirmAction(`${currentlyActive?'Disable':'Enable'} this account?`, async ()=>{
    try{ await sbUpdate('profiles', `?id=eq.${id}`, { active: !currentlyActive }); toast('Updated.','success'); await loadProfiles(); }
    catch(e){ toast(e.message,'error'); }
    update();
  });
}
function renderActivityTab(){
  return `<div class="card no-pad"><table class="table"><thead><tr><th>Type</th><th>Details</th><th>By</th><th>When</th></tr></thead>
    <tbody>${state.activity.length? state.activity.map(renderActivityRow).join('') : `<tr><td colspan="4" class="empty-hint">No activity yet.</td></tr>`}</tbody></table></div>`;
}

/* ============================================================
   LOGIN REQUESTS TAB (admin)
   ============================================================ */
function renderRequestsTab(){
  const pending = state.loginRequests.filter(r=>r.status==='pending');
  const decided = state.loginRequests.filter(r=>r.status!=='pending').slice(0,40);
  return `<div class="card" style="margin-bottom:18px;"><h3>Pending (${pending.length})</h3>
    ${pending.length? pending.map(r=>`<div class="card" style="margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
      <div><b>${esc(r.email||'')}</b><div class="muted">${esc(r.device_info||'')} · ${fmtTime(r.requested_at)}</div></div>
      <div class="row-actions"><button class="btn btn-secondary btn-sm" onclick="decideLoginRequest('${escAttr(r.id)}','approved')">Approve</button><button class="btn btn-danger btn-sm" onclick="decideLoginRequest('${escAttr(r.id)}','denied')">Deny</button></div>
    </div>`).join('') : `<p class="empty-hint">No pending requests.</p>`}
  </div>
  <div class="card no-pad"><table class="table"><thead><tr><th>Email</th><th>Status</th><th>Decided</th><th>By</th></tr></thead>
    <tbody>${decided.length? decided.map(r=>`<tr><td data-label="Email">${esc(r.email||'')}</td><td data-label="Status"><span class="badge badge-${r.status==='approved'?'student_restore':'student_archive'}">${esc(r.status)}</span></td><td data-label="Decided" class="muted">${fmtTime(r.decided_at)}</td><td data-label="By" class="muted">${esc(r.decided_by_name||'')}</td></tr>`).join('') : `<tr><td colspan="4" class="empty-hint">No history yet.</td></tr>`}</tbody></table></div>`;
}
async function decideLoginRequest(id, status){
  try{ await sbUpdate('login_requests', `?id=eq.${id}`, { status, decided_at:new Date().toISOString(), decided_by_name: state.user.name }); toast('Updated.','success'); await loadLoginRequests(); }
  catch(e){ toast(e.message,'error'); }
  update();
}

/* ============================================================
   ACCOUNTANT SHELL
   ============================================================ */
function renderAccountantShell(){
  return `<div class="acc-shell">${renderTopbar()}
    <div class="acc-tabs">
      <button class="tab-btn ${state.accTab==='scan'?'active':''}" onclick="setAccTab('scan')">Scan</button>
      <button class="tab-btn ${state.accTab==='attendance'?'active':''}" onclick="setAccTab('attendance')">Attendance</button>
      <button class="tab-btn ${state.accTab==='students'?'active':''}" onclick="setAccTab('students')">Students</button>
      <button class="tab-btn ${state.accTab==='leaves'?'active':''}" onclick="setAccTab('leaves')">Leaves</button>
      <button class="tab-btn ${state.accTab==='myactivity'?'active':''}" onclick="setAccTab('myactivity')">My activity</button>
    </div>
    <main class="main acc-main">${
      state.accTab==='scan'?renderScanTab():
      state.accTab==='attendance'?renderAttendanceTab():
      state.accTab==='students'?renderStudentsTab():
      state.accTab==='leaves'?renderLeavesTab():
      renderMyActivityTab()
    }</main>
  </div>${renderModal()}${renderToast()}${renderLightbox()}`;
}
function setAccTab(tab){
  if ((state.accTab==='scan'||state.accTab==='attendance') && state.scanning) stopCamera();
  state.accTab=tab; state.scanning=false; state.scanResult=null; state.search='';
  update();
  if (tab==='leaves') loadLeaves().then(update);
  if (tab==='attendance'){ if (!state.attDate) state.attDate = localDateStr(); loadAttendanceForDate(state.attDate).then(list=>{ state._attendanceList=list; update(); }); }
  if (tab==='myactivity') state._myPayments=null;
}
function renderManualEntry(){
  return `<div class="manual-entry"><p class="muted">Or enter the roll number manually:</p>
    <div class="manual-row"><input id="manual-roll" class="manual-input mono" placeholder="e.g. BCA2024015" onkeydown="if(event.key==='Enter') submitManualLookup()" />
    <button class="btn btn-secondary" onclick="submitManualLookup()">Look up</button></div></div>`;
}
function renderScanTab(){
  if (state.scanning){
    return `<div class="scan-panel"><div class="scan-frame"><div id="qr-reader"></div><div class="frame-corners"></div></div>
      <p class="muted">Point the camera at the student's QR code.</p>
      <button class="btn btn-ghost" onclick="cancelScan()">Cancel</button>${renderManualEntry()}</div>`;
  }
  return `<div class="scan-panel scan-idle"><div class="scan-hero"><div class="scan-hero-icon">▣</div><h2>Scan a student ID</h2>
    <p class="muted">Scanning opens their full profile immediately.</p>
    <button class="btn btn-primary btn-lg" onclick="startScan()">Start camera scan</button></div>${renderManualEntry()}</div>`;
}
function startScan(){ state.scanning=true; update(); setTimeout(initCamera,60); }
function initCamera(){
  if (typeof Html5Qrcode==='undefined'){ toast('Camera library failed to load. Check your connection and reload.','error'); state.scanning=false; update(); return; }
  try{
    html5QrCode = new Html5Qrcode('qr-reader');
    html5QrCode.start({ facingMode:'environment' }, { fps:10, qrbox:240 }, (decodedText)=>{ handleScanSuccess(decodedText); }, ()=>{})
      .catch(err=>{ toast('Could not access the camera: '+(err.message||err),'error'); state.scanning=false; update(); });
  }catch(err){ toast('Could not start the camera.','error'); state.scanning=false; update(); }
}
function stopCamera(){ if (html5QrCode){ try{ html5QrCode.stop().then(()=>{ try{ html5QrCode.clear(); }catch(e){} }).catch(()=>{}); }catch(e){} } }
function cancelScan(){ stopCamera(); state.scanning=false; update(); }
function handleScanSuccess(decodedText){
  const mode = currentScanMode();
  if (mode==='attendance'){
    const now = Date.now();
    if (decodedText===lastAttendanceScanCode && (now-lastAttendanceScanTime) < 3000) return;
    lastAttendanceScanCode = decodedText; lastAttendanceScanTime = now;
    markAttendance(decodedText);
    return; // keep the camera running for the next student
  }
  stopCamera(); state.scanning=false;
  if (mode==='gate') gateLookup(decodedText);
  else scanLookup(decodedText);
}
function submitManualLookup(){
  const val=document.getElementById('manual-roll').value.trim(); if(!val){ toast('Enter a roll number first.','error'); return; }
  const mode = currentScanMode();
  if (mode==='gate') gateLookup(val);
  else if (mode==='attendance') markAttendance(val);
  else scanLookup(val);
}
async function scanLookup(code){
  const normalized = String(code).trim();
  try{
    let rows = state.students.filter(s=>s.roll_no.toLowerCase()===normalized.toLowerCase());
    if (!rows.length){ await loadStudents(); rows = state.students.filter(s=>s.roll_no.toLowerCase()===normalized.toLowerCase()); }
    if (rows.length){
      buzz(60);
      sbRpc('log_scan', { p_roll_no: rows[0].roll_no, p_student_name: rows[0].name }).then(()=>loadActivity()).catch(()=>{});
      openStudentProfile(rows[0].roll_no);
    } else {
      toast(`No student matches code "${normalized}".`,'error');
    }
  }catch(e){ toast('Lookup failed: '+e.message,'error'); }
}
function renderMyActivityTab(){
  if (state.user.role==='gatekeeper'){
    const mineActivity = filterByDate(state.activity.filter(a=>a.by_name===state.user.name), state.myTxnDateFrom, state.myTxnDateTo, 'created_at').slice(0,80);
    return `<div class="toolbar"><div class="manual-row">
      <input type="date" class="date-input" id="myt-from" value="${state.myTxnDateFrom||''}" onchange="setMyTxnDateFilter(this.value, document.getElementById('myt-to').value)" />
      <input type="date" class="date-input" id="myt-to" value="${state.myTxnDateTo||''}" onchange="setMyTxnDateFilter(document.getElementById('myt-from').value, this.value)" />
    </div></div>
    <div class="card no-pad"><table class="table"><thead><tr><th>Type</th><th>Details</th><th>By</th><th>When</th></tr></thead>
      <tbody>${mineActivity.length? mineActivity.map(renderActivityRow).join('') : `<tr><td colspan="4" class="empty-hint">No activity yet.</td></tr>`}</tbody></table></div>`;
  }
  if (!state._myPayments){ loadMyPayments().then(p=>{ state._myPayments=p; update(); }); return `<div class="card"><p class="empty-hint">Loading…</p></div>`; }
  const filtered = filterByDate(state._myPayments, state.myTxnDateFrom, state.myTxnDateTo, 'created_at');
  const total = filtered.reduce((s,p)=>s+(p.amount||0),0);
  const mineActivity = filterByDate(state.activity.filter(a=>a.by_name===state.user.name), state.myTxnDateFrom, state.myTxnDateTo, 'created_at').slice(0,50);
  return `<div class="toolbar">
    <div class="manual-row">
      <input type="date" class="date-input" id="myt-from" value="${state.myTxnDateFrom||''}" onchange="setMyTxnDateFilter(this.value, document.getElementById('myt-to').value)" />
      <input type="date" class="date-input" id="myt-to" value="${state.myTxnDateTo||''}" onchange="setMyTxnDateFilter(document.getElementById('myt-from').value, this.value)" />
    </div>
    <div class="toolbar-actions"><span class="muted">My total in range: <b>${fmtMoney(total)}</b></span></div>
  </div>
  <div class="card no-pad" style="margin-bottom:18px;"><table class="table"><thead><tr><th>Student</th><th>Amount</th><th>Method</th><th>When</th></tr></thead>
    <tbody>${filtered.length? filtered.map(p=>{ const stu=p.students||{}; return `<tr><td data-label="Student">${esc(stu.name||'')} <span class="muted mono">${esc(stu.roll_no||'')}</span></td><td data-label="Amount">${fmtMoney(p.amount)}</td><td data-label="Method"><span class="badge badge-payment">${esc(p.payment_method)}</span></td><td data-label="When" class="muted">${fmtTime(p.created_at)}</td></tr>`; }).join('') : `<tr><td colspan="4" class="empty-hint">No payments in this range.</td></tr>`}</tbody></table></div>
  <div class="card no-pad"><table class="table"><thead><tr><th>Type</th><th>Details</th><th>By</th><th>When</th></tr></thead>
    <tbody>${mineActivity.length? mineActivity.map(renderActivityRow).join('') : `<tr><td colspan="4" class="empty-hint">No activity yet.</td></tr>`}</tbody></table></div>`;
}
async function loadMyPayments(){ try{ return await sbSelect('payments', `?recorded_by=eq.${state.user.id}&archived=eq.false&select=*,students(roll_no,name)&order=created_at.desc&limit=400`); }catch(e){ return []; } }
function setMyTxnDateFilter(from,to){ state.myTxnDateFrom=from||null; state.myTxnDateTo=to||null; update(); }
async function recordPayment(rollNo){
  const amount = parseFloat(document.getElementById('pay-amount').value);
  const method = document.getElementById('pay-method').value;
  const uid = document.getElementById('pay-uid') ? document.getElementById('pay-uid').value.trim() : '';
  const bank = document.getElementById('pay-bank') ? document.getElementById('pay-bank').value.trim() : '';
  const note = document.getElementById('pay-note').value.trim();
  if (!amount || amount<=0){ toast('Enter a valid amount.','error'); return; }
  if (method==='online' && (!uid || !bank)){ toast('Enter the transaction UID and bank for online payments.','error'); return; }
  const btn = document.getElementById('pay-btn'); if (btn){ btn.disabled=true; btn.textContent='Recording…'; }
  try{
    await sbRpc('record_payment', { p_roll_no: rollNo, p_amount: amount, p_note: note, p_method: method, p_uid: uid, p_bank: bank });
    closeModal();
    state._myPayments=null; state._allPayments=null;
    await loadStudents();
    await loadActivity();
    const updated = state.students.find(s=>s.roll_no.toLowerCase()===rollNo.toLowerCase());
    const nowDue = updated ? Math.max(0,(updated.fee_total||0)-(updated.fee_paid||0)) : null;
    if (nowDue===0){ buzz([50,40,50,40,80]); toast('Payment recorded — fully paid! 🎉','success'); }
    else { buzz(50); toast('Payment recorded.','success'); }
    openStudentProfile(rollNo);
  }catch(e){ toast(e.message,'error'); if (btn){ btn.disabled=false; btn.textContent='Record payment'; } }
}

/* ============================================================
   GATEKEEPER SHELL — photo + name + permission status ONLY
   ============================================================ */
function renderGateShell(){
  return `<div class="acc-shell">${renderTopbar()}
    <div class="acc-tabs">
      <button class="tab-btn ${state.gateTab==='gate'?'active':''}" onclick="setGateTab('gate')">Gate</button>
      <button class="tab-btn ${state.gateTab==='roster'?'active':''}" onclick="setGateTab('roster')">Leave Roster</button>
      <button class="tab-btn ${state.gateTab==='myactivity'?'active':''}" onclick="setGateTab('myactivity')">My activity</button>
    </div>
    <main class="main acc-main">${
      state.gateTab==='gate'?renderGateTab():
      state.gateTab==='roster'?renderGateRosterTab():
      renderMyActivityTab()
    }</main>
  </div>${renderModal()}${renderToast()}${renderLightbox()}`;
}
function setGateTab(tab){ if (state.gateTab==='gate' && state.scanning) stopCamera(); state.gateTab=tab; state.scanning=false; state.gateResult=null; update(); }
function renderGateTab(){
  if (state.gateResult) return state.gateResult.found ? renderGateResultCard(state.gateResult.student) : renderNotFoundCard(state.gateResult.code);
  if (state.scanning){
    return `<div class="scan-panel"><div class="scan-frame"><div id="qr-reader"></div><div class="frame-corners"></div></div>
      <p class="muted">Point the camera at the student's QR code.</p>
      <button class="btn btn-ghost" onclick="cancelScan()">Cancel</button>${renderManualEntry()}</div>`;
  }
  return `<div class="scan-panel scan-idle"><div class="scan-hero"><div class="scan-hero-icon">▣</div><h2>Mark a student out / in</h2>
    <p class="muted">Scan their ID to check current leave status.</p>
    <button class="btn btn-primary btn-lg" onclick="startScan()">Start camera scan</button></div>${renderManualEntry()}</div>`;
}
async function gateLookup(code){
  try{
    const rows = await sbRpc('gatekeeper_lookup', { p_roll_no: String(code).trim() });
    const student = rows && rows[0];
    if (student){ buzz(student.leave_status==='out' ? [40,60,40] : 60); state.gateResult = { found:true, student }; update(); }
    else { buzz([20,40,20,40,20]); state.gateResult = { found:false, code }; update(); }
  }catch(e){ toast('Lookup failed: '+e.message,'error'); }
}
function renderGateResultCard(s){
  const status = s.leave_status;
  return `<div class="result-card">
    <div class="stamp ${status==='out'?'stamp-amber':''}">${status==='out'?'● CURRENTLY OUT':'✓ FOUND'}</div>
    <div class="profile-head">
      <div class="profile-photo" id="gate-photo-holder" onclick="openPhotoLightbox(this)" style="background:${avatarColor(s.name)}">${esc(initials(s.name))}</div>
      <div><div class="profile-name">${esc(s.name)}</div><div class="profile-roll">${esc(s.roll_no)}</div></div>
    </div>
    <div class="profile-section-title">Permission status</div>
    <p>${status==='approved'? `<span class="badge badge-approved">Permitted to leave</span> — token <b class="mono">${esc(s.token||'')}</b>` :
        status==='out'? `<span class="badge badge-out">Currently out</span> — token <b class="mono">${esc(s.token||'')}</b>` :
        `<span class="muted">No approved leave for this student right now.</span>`}</p>
    <div class="profile-actions">
      ${status==='approved'? `<button class="btn btn-amber" onclick="doMarkOut('${escAttr(s.roll_no)}')">Mark OUT</button>` : ''}
      ${status==='out'? `<button class="btn btn-primary" onclick="doMarkIn('${escAttr(s.roll_no)}')">Mark IN</button>` : ''}
      <button class="btn btn-ghost" onclick="resetGate()">Scan another</button>
    </div>
  </div>`;
}
function renderNotFoundCard(code){
  return `<div class="result-card result-error"><div class="stamp stamp-error">✕ NOT FOUND</div>
    <p>No student matches the code <span class="mono">${esc(code)}</span>.</p>
    <button class="btn btn-primary" onclick="resetGate()">Try again</button></div>`;
}
function resetGate(){ state.gateResult=null; update(); }
async function doMarkOut(rollNo){
  try{ await sbRpc('mark_leave_out', { p_roll_no: rollNo }); toast('Marked out.','success'); state._roster=null; gateLookup(rollNo); }
  catch(e){ toast(e.message,'error'); }
}
async function doMarkIn(rollNo){
  try{ await sbRpc('mark_leave_in', { p_roll_no: rollNo }); toast('Marked in.','success'); state._roster=null; gateLookup(rollNo); }
  catch(e){ toast(e.message,'error'); }
}
async function loadGatekeeperRoster(){ try{ return await sbRpc('gatekeeper_active_leaves', {}); }catch(e){ return []; } }
function renderGateRosterTab(){
  if (!state._roster){ loadGatekeeperRoster().then(r=>{ state._roster=r; update(); }); return `<div class="card"><p class="empty-hint">Loading…</p></div>`; }
  const rows = state._roster;
  return `<div class="toolbar"><div></div><div class="toolbar-actions"><button class="btn btn-secondary" onclick="state._roster=null; update();">Refresh</button></div></div>
  <p class="muted" style="margin-bottom:14px;">Everyone currently permitted to leave or already out — match faces here if a QR code is damaged or unavailable.</p>
  <div class="student-grid">${rows.length? rows.map(r=>`<div class="student-card" style="cursor:default;">
    <div class="student-card-top">
      <div class="sc-avatar" data-roster-photo="${escAttr(r.roll_no)}" style="background:${avatarColor(r.name)}">${esc(initials(r.name))}</div>
      <div><div class="sc-name">${esc(r.name)}</div><div class="sc-roll">${esc(r.roll_no)}</div></div>
    </div>
    <span class="out-pill" style="background:${r.status==='out'?'var(--red-soft)':'var(--amber-soft)'}; color:${r.status==='out'?'var(--red)':'var(--amber)'};">● ${r.status==='out'?'Out':'Permitted'} · token ${esc(r.token||'')}</span>
  </div>`).join('') : `<p class="empty-hint">No one currently has an active leave.</p>`}</div>`;
}
function loadRosterPhotos(){
  if (!state._roster) return;
  document.querySelectorAll('[data-roster-photo]').forEach(el=>{
    const roll = el.getAttribute('data-roster-photo');
    if (el.querySelector('img')) return;
    const r = state._roster.find(x=>x.roll_no===roll);
    if (!r || !r.photo_path) return;
    sbSignedUrl('student-photos', r.photo_path, 600).then(url=>{ if (url && el.isConnected) el.innerHTML = `<img src="${url}" alt="" />`; }).catch(()=>{});
  });
}

/* ============================================================
   MODAL DISPATCH
   ============================================================ */
function renderModal(){
  if (!state.modal) return '';
  switch(state.modal.type){
    case 'studentForm': return studentFormModalHTML(state.modal.existing, state.modal.contacts);
    case 'profile': return profileModalHTML(state.modal.student, state.modal.payments, state.modal.leaveHistory);
    case 'archive': return archiveModalHTML(state.modal.rollNo);
    case 'bulkImport': return bulkImportModalHTML();
    case 'grantLeave': return grantLeaveModalHTML(state.modal.rollNo);
    case 'batches': return batchesModalHTML();
    case 'batchAssign': return batchAssignModalHTML(state.modal);
    case 'editPayment': return editPaymentModalHTML(state.modal.payment);
    case 'rowDetail': return rowDetailModalHTML(state.modal);
    case 'changepw': return changePasswordModalHTML();
    case 'confirm': return `<div class="modal-overlay"><div class="modal modal-sm"><p>${esc(state.modal.message)}</p><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-danger" onclick="runConfirmedAction()">Confirm</button></div></div></div>`;
    default: return '';
  }
}

/* ============================================================
   INIT
   ============================================================ */
async function init(){
  await loadTheme();
  render();
  await loadConfig();
  if (!state.sbUrl || !state.sbAnonKey){ state.view='setup'; update(); return; }
  await loadPersistedSession();
  if (session){
    try{
      await getValidAccessToken();
      await loadMyProfile();
      if (state.user.role !== 'admin'){
        // re-check whether our most recent login request (if any) is still pending/approved
        try{
          const rows = await sbSelect('login_requests', `?user_id=eq.${state.user.id}&select=*&order=requested_at.desc&limit=1`);
          const latest = rows && rows[0];
          if (!latest || latest.status==='denied'){
            await requestLoginApproval();
            state.view='waiting-approval'; update(); startApprovalPolling(); return;
          } else if (latest.status==='pending'){
            state.myLoginRequestId = latest.id;
            state.view='waiting-approval'; update(); startApprovalPolling(); return;
          }
        }catch(e){}
      }
      state.view='app';
      await loadAllForRole();
    }catch(e){ await clearSession(); state.view='login'; }
  } else { state.view='login'; }
  update();
}
init();
</script>
